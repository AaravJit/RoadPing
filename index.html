<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RoadPing — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --surface-1: #0a0a0a;
      --surface-2: #131313;
      --surface-3: #1c1c1c;
      --line: rgba(255,255,255,0.08);
      --line-2: rgba(255,255,255,0.14);
      --text: #f5f5f5;
      --text-dim: rgba(245,245,245,0.62);
      --text-mute: rgba(245,245,245,0.38);
      --accent: #FF6A1A;
      --accent-soft: rgba(255,106,26,0.16);
      --accent-glow: rgba(255,106,26,0.55);
      --danger: #FF3D2E;
      --safe: #5BE49B;
      --sans: 'Space Grotesk', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(1200px 800px at 50% 20%, #0d0a08 0%, #000 60%);
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 16px 60px;
    }
    .brandbar {
      width: 100%; max-width: 1100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 4px 12px;
    }
    .wordmark {
      font-family: var(--sans);
      font-weight: 700; font-size: 17px; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px;
    }
    .wordmark .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .wordmark .small { color: var(--text-mute); font-weight: 500; margin-left: 6px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
    .picker {
      display: flex; gap: 4px; flex-wrap: nowrap;
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      max-width: 760px;
    }
    .picker::-webkit-scrollbar { display: none; }
    .picker button {
      font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); background: transparent; border: none;
      padding: 7px 10px; border-radius: 999px; cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .picker button:hover { color: var(--text); }
    .picker button.active {
      background: var(--accent); color: #0a0a0a;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .stage {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .stage::before {
      content: ''; position: absolute; inset: -20px;
      background: radial-gradient(400px 400px at 50% 50%, rgba(255,106,26,0.08), transparent 70%);
      pointer-events: none;
    }
    .hint {
      margin-top: 22px;
      font-family: var(--mono); font-size: 11px; color: var(--text-mute);
      letter-spacing: 0.08em; text-transform: uppercase;
      text-align: center;
    }
    .hint kbd {
      font-family: var(--mono); font-size: 10px;
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 2px 6px; border-radius: 4px; color: var(--text-dim);
    }
    /* Phone-internal helpers */
    .rp-app { position: absolute; inset: 0; overflow: hidden; background: #000; color: var(--text); font-family: var(--sans); }
    .rp-screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
    button { font-family: inherit; }
    /* No scroll on phone inner content unless explicit */
    .rp-app *::-webkit-scrollbar { display: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="brandbar">
    <div class="wordmark">
      <span class="dot"></span>
      RoadPing
      <span class="small">v0.1 · interactive prototype</span>
    </div>
    <div id="picker-root"></div>
  </div>

  <div class="stage" id="stage-root"></div>

  <div class="hint">Hold the orange button to talk &middot; Tap a driver dot to see their card &middot; Use the picker above to jump screens</div>

  <script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

//         Hello

//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />

//                        options={['#D97757', '#2A6FDB', '#1F8A5B', '#7A5AE0']}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

        to { transform: rotate(360deg); }
      }
      @keyframes rpSweepIn {
        0%   { transform: rotate(-180deg); opacity: 0; }
        100% { transform: rotate(0deg);    opacity: 1; }
      }
      @keyframes rpRise {
        0%   { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0);     opacity: 1; }
      }
      @keyframes rpSheetIn {
        0%   { transform: translateY(100%); }
        100% { transform: translateY(0);    }
      }
      @keyframes rpFadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
    `}</style>
  );
}

// ─── 1. Launch screen ────────────────────────────────────────
function LaunchScreen({ go }) {
  const [r, setR] = React.useState(0);
  React.useEffect(() => {
    let raf, last = performance.now();
    const tick = (t) => { const dt = (t - last)/1000; last = t; setR(x => (x + dt*90) % 360); raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  return (
    <div className="rp-screen" style={{ background: '#000', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ position: 'relative', width: 220, height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'rpFadeIn 0.6s ease' }}>
        {/* concentric rings */}
        {[60, 95, 130].map((rr, i) => (
          <div key={i} style={{
            position: 'absolute', width: rr*2, height: rr*2, borderRadius: '50%',
            border: '1px solid rgba(255,106,26,' + (0.35 - i*0.08) + ')',
          }} />
        ))}
        {/* sweep */}
        <svg width="220" height="220" style={{ position: 'absolute', inset: 0 }}>
          <defs>
            <linearGradient id="launchSweep" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="rgba(255,106,26,0)"/>
              <stop offset="100%" stopColor="rgba(255,106,26,0.6)"/>
            </linearGradient>
          </defs>
          <g transform={`rotate(${r} 110 110)`}>
            <path d={`M 110 110 L 240 110 A 130 130 0 0 0 ${110 + 130*Math.cos(-0.7)} ${110 + 130*Math.sin(-0.7)} Z`} fill="url(#launchSweep)"/>
          </g>
        </svg>
        {/* center wordmark dot */}
        <div style={{
          width: 14, height: 14, borderRadius: '50%', background: '#FF6A1A',
          boxShadow: '0 0 24px var(--accent-glow)',
        }} />
      </div>
      <div style={{ position: 'absolute', bottom: 100, textAlign: 'center', animation: 'rpRise 0.7s 0.2s both' }}>
        <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em' }}>RoadPing</div>
        <div style={{ marginTop: 8, fontFamily: 'var(--mono)', fontSize: 10.5, letterSpacing: '0.18em', color: 'var(--text-mute)' }}>
          LIVE NEARBY VOICE FOR DRIVERS

      </div>
      <button onClick={() => go('auth')} style={{
        position: 'absolute', bottom: 50, fontFamily: 'var(--mono)', fontSize: 11,
        letterSpacing: '0.2em', color: 'var(--text-dim)', background: 'transparent',
        border: 'none', cursor: 'pointer', padding: 12,

  return (

    </div>
  );
}

function VehicleGlyph({ body = 'sedan', color = '#FF6A1A', size = 160, mono = false }) {
  if (body === 'motorcycle') return <MotorcycleGlyph color={color} size={size} mono={mono}/>;
  const def = BODY_PATHS[body] || BODY_PATHS.sedan;
  const stroke = mono ? '#fff' : 'rgba(255,255,255,0.15)';
  const window = mono ? 'rgba(255,255,255,0.0)' : 'rgba(0,0,0,0.35)';
  const wheelStroke = mono ? '#fff' : color;

  return (
    <svg width={size} height={size * 0.55} viewBox="0 0 200 110" style={{ display: 'block' }}>
      {/* shadow */}
      {!mono && <ellipse cx="100" cy="94" rx="80" ry="3" fill="rgba(0,0,0,0.4)"/>}
      {/* body */}
      <path d={def.body} fill={mono ? 'none' : color} stroke={stroke} strokeWidth={mono ? 1.4 : 0.8} strokeLinejoin="round"/>
      {/* window */}
      {!mono && <path d={def.window} fill={window}/>}
      {/* wheels */}
      {def.wheels.map((w, i) => (
        <g key={i}>
          <circle cx={w[0]} cy={w[1]} r={w[2]}     fill={mono ? 'none' : '#08090b'} stroke={wheelStroke} strokeWidth="1.4"/>
          {!mono && <circle cx={w[0]} cy={w[1]} r={w[2] - 8} fill="#1a1b1e"/>}
        </g>
      ))}
    </svg>
  );
}

function MotorcycleGlyph({ color = '#FF6A1A', size = 160, mono = false }) {

              <button key={label} onClick={() => { onSelect(o); onClose(); }} style={{

// Minimal monochrome badge for a make name.
function MakeBadge({ name }) {
  if (!name || name.length === 0) {
    return <div style={badgeStyle}>—</div>;
  }
  // 1-2 letter monogram
  const m = name.split(/[\s-]/).map(p => p[0]).join('').slice(0, 2).toUpperCase();
  return <div style={badgeStyle}>{m}</div>;
}
const badgeStyle = {
  width: 28, height: 28, borderRadius: 7,
  background: 'rgba(255,255,255,0.06)',

      {/* Pickers */}

// zones.jsx — Add Custom Private Zone flow (frontend only).
// Mini-map + draggable center pin + radius chips + name field.

function CustomZoneScreen({ go, back }) {
  const [name, setName] = React.useState('');
  const [radius, setRadius] = React.useState(500); // 300 | 500 | 700
  const [pin, setPin] = React.useState({ x: 50, y: 50 }); // percent within map area
  const mapRef = React.useRef(null);
  const dragRef = React.useRef(false);

  const radiusPx = {
    300: 56,
    500: 86,
    700: 116,
  }[radius];

  const startDrag = (e) => {
    dragRef.current = true;
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
    move(e);
  };
  const move = (e) => {
    if (!dragRef.current) return;
    const r = mapRef.current?.getBoundingClientRect();
    if (!r) return;
    const x = Math.max(0, Math.min(100, ((e.clientX - r.left) / r.width) * 100));
    const y = Math.max(0, Math.min(100, ((e.clientY - r.top) / r.height) * 100));
    setPin({ x, y });
  };
  const endDrag = (e) => {
    dragRef.current = false;
    e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId);
  };

  const onSave = () => {
    // frontend-only — bounce back to zones list
    go('zones');
  };

  return (
    <div className="rp-screen" style={{ background: '#000' }}>
      {/* Top bar */}
      <div style={{ padding: '62px 22px 8px', display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={back} style={{ ...iconBtn, width: 36, height: 36 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div style={{ flex: 1, textAlign: 'center', fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em', color: 'var(--text-mute)' }}>
          ADD CUSTOM ZONE
        </div>
        <button onClick={onSave} style={{
          fontFamily: 'var(--mono)', fontSize: 10.5, letterSpacing: '0.18em',
          color: name ? '#FF6A1A' : 'var(--text-mute)',
          background: 'transparent', border: 'none', cursor: name ? 'pointer' : 'not-allowed',
          padding: 6,
        }} disabled={!name}>SAVE</button>
      </div>

      {/* Mini-map */}
      <div style={{ padding: '6px 16px 0' }}>
        <div
          ref={mapRef}
          onPointerDown={startDrag}
          onPointerMove={move}
          onPointerUp={endDrag}
          onPointerCancel={endDrag}
          style={{
            position: 'relative',
            width: '100%', aspectRatio: '1 / 1',
            borderRadius: 16, overflow: 'hidden',
            border: '1px solid var(--line-2)',
            background: '#06070a',
            touchAction: 'none',
            cursor: 'grab',
          }}>
          <MiniMapSVG />

          {/* radius ring + pin */}
          <div style={{
            position: 'absolute',
            left: `${pin.x}%`, top: `${pin.y}%`,
            transform: 'translate(-50%, -50%)',
            pointerEvents: 'none',
          }}>
            {/* radius fill */}
            <div style={{
              width: radiusPx * 2, height: radiusPx * 2, borderRadius: '50%',
              background: 'radial-gradient(circle, rgba(255,106,26,0.22) 0%, rgba(255,106,26,0.06) 70%, rgba(255,106,26,0) 100%)',
              border: '1.5px dashed rgba(255,106,26,0.7)',
              position: 'absolute',
              left: '50%', top: '50%', transform: 'translate(-50%, -50%)',
              transition: 'width 0.25s ease, height 0.25s ease',
            }} />
            {/* radius label */}
            <div style={{
              position: 'absolute', left: '50%', top: `calc(50% - ${radiusPx + 14}px)`,
              transform: 'translateX(-50%)',
              fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em',
              color: '#FF6A1A',
              background: 'rgba(0,0,0,0.7)', padding: '3px 7px', borderRadius: 4,
              whiteSpace: 'nowrap',
            }}>{radius}m</div>
            {/* draggable pin */}
            <div style={{
              position: 'relative',
              width: 28, height: 28, borderRadius: '50%',
              background: '#FF6A1A',
              boxShadow: '0 0 0 4px rgba(0,0,0,0.6), 0 0 18px rgba(255,106,26,0.7)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{
                width: 6, height: 6, borderRadius: '50%', background: '#fff',
              }} />
            </div>
          </div>

          {/* drag hint, fades away if pin has moved */}
          <div style={{
            position: 'absolute', bottom: 10, left: 0, right: 0, textAlign: 'center',
            fontFamily: 'var(--mono)', fontSize: 9.5, letterSpacing: '0.18em',
            color: 'rgba(255,255,255,0.45)', pointerEvents: 'none',
          }}>DRAG TO POSITION</div>
        </div>
      </div>

      {/* Form */}
      <div style={{ flex: 1, overflow: 'auto', padding: '16px 22px 16px' }}>
        {/* radius */}
        <FieldLabel>Radius</FieldLabel>
        <div style={{ marginTop: 6, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
          {[300, 500, 700].map(r => (
            <button key={r} onClick={() => setRadius(r)} style={{
              padding: '12px 0', borderRadius: 12,
              background: radius === r ? 'rgba(255,106,26,0.10)' : 'var(--surface-1)',
              border: radius === r ? '1px solid rgba(255,106,26,0.6)' : '1px solid var(--line)',
              color: radius === r ? '#FF6A1A' : '#fff',
              fontFamily: 'var(--mono)', fontSize: 13, letterSpacing: '0.06em', cursor: 'pointer',
            }}>{r}m</button>
          ))}
        </div>

        <div style={{ marginTop: 16 }}>
          <Field label="Zone name">
            <input value={name} onChange={e => setName(e.target.value)}
              placeholder="e.g. Mom's house · Studio · Storage"
              style={fieldInput}/>
          </Field>
        </div>

        <div style={{
          marginTop: 14, padding: 14, borderRadius: 12,
          background: 'rgba(255,255,255,0.03)', border: '1px solid var(--line)',
          fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.5,
        }}>
          <span style={{ color: '#fff', fontWeight: 600 }}>RoadPing will block Start when you are too close to this zone.</span>
          <br/>Private Zones are never shown to other users.
        </div>
      </div>

      {/* Footer */}

          background: name ? 'linear-gradient(180deg, #FFA764, #FF6A1A)' : 'rgba(255,255,255,0.06)',
          color: name ? '#0a0a0a' : 'rgba(255,255,255,0.35)',

// onboarding.jsx — Sign-in + setup flow for RoadPing.
// Auth → Driver profile → Car profile → Visibility → Private Zones → Safety → Permissions → Hidden (Start)

// ─── Shell ────────────────────────────────────────────────
function OnboardingShell({ step, total, onBack, eyebrow, title, body, children,
                          primaryLabel = 'Continue', onPrimary,
                          secondaryLabel, onSecondary,
                          primaryDisabled = false }) {
  return (
    <div className="rp-screen" style={{ background: '#000' }}>
      {/* top bar */}
      <div style={{ padding: '62px 22px 8px', display: 'flex', alignItems: 'center', gap: 12 }}>
        {onBack ? (
          <button onClick={onBack} style={{ ...iconBtn, width: 36, height: 36 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
        ) : <div style={{ width: 36, height: 36 }} />}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>
          {Array.from({ length: total }).map((_, i) => (
            <span key={i} style={{
              flex: 1, height: 3, borderRadius: 2,
              background: i < step ? '#FF6A1A' : 'rgba(255,255,255,0.10)',
              boxShadow: i === step - 1 ? '0 0 8px rgba(255,106,26,0.6)' : 'none',
              transition: 'all 0.2s ease',
            }} />
          ))}
        </div>
        <div style={{
          width: 36, textAlign: 'right',
          fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text-mute)', letterSpacing: '0.12em',
        }}>
          {step}/{total}
        </div>
      </div>

      {/* header */}
      <div style={{ padding: '14px 22px 8px' }}>
        {eyebrow && (
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em', color: '#FF6A1A', marginBottom: 8 }}>
            {eyebrow}
          </div>
        )}
        <div style={{ fontSize: 26, fontWeight: 600, letterSpacing: '-0.02em', lineHeight: 1.15 }}>
          {title}
        </div>
        {body && (
          <div style={{ marginTop: 10, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.5 }}>
            {body}
          </div>
        )}
      </div>

      {/* content */}
      <div style={{ flex: 1, overflow: 'auto', padding: '14px 22px 16px' }}>
        {children}
      </div>

      {/* footer */}
      <div style={{ padding: '14px 22px 44px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        <button
          disabled={primaryDisabled}
          onClick={onPrimary}
          style={{
            width: '100%', padding: '15px 16px', borderRadius: 14,
            border: 'none', cursor: primaryDisabled ? 'not-allowed' : 'pointer',
            background: primaryDisabled ? 'rgba(255,255,255,0.06)' : 'linear-gradient(180deg, #FFA764, #FF6A1A)',
            color: primaryDisabled ? 'rgba(255,255,255,0.3)' : '#0a0a0a',
            fontFamily: 'var(--sans)', fontSize: 15, fontWeight: 600,
            letterSpacing: '-0.01em',
            boxShadow: primaryDisabled ? 'none' : '0 8px 24px rgba(255,106,26,0.35)',
          }}>{primaryLabel}</button>
        {secondaryLabel && (
          <button onClick={onSecondary} style={{
            width: '100%', padding: '12px 16px',
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: 14, fontWeight: 500,
          }}>{secondaryLabel}</button>
        )}
      </div>
    </div>
  );
}

// ─── 4. Car profile ───────────────────────────────────────
function CarSetupScreen({ go, back, car, setCar }) {

  const [make, setMake] = React.useState('Toyota');
  const [model, setModel] = React.useState('GR Corolla');
  const [color, setColor] = React.useState('amber');
  const [nick, setNick] = React.useState('');

  const colors = [
    { id: 'white', hex: '#E8E6E0' },
    { id: 'silver',hex: '#9aa0a6' },
    { id: 'black', hex: '#15161a' },
    { id: 'red',   hex: '#D94F3A' },
    { id: 'amber', hex: '#FF6A1A' },
    { id: 'blue',  hex: '#1E4FB8' },
    { id: 'green', hex: '#3C7A4B' },
    { id: 'yellow',hex: '#F2C200' },
  ];
  const selected = colors.find(c => c.id === color) || colors[0];

  return (
    <OnboardingShell
      step={2} total={4} onBack={back}
      eyebrow="STEP 2 OF 4"
      title="Your car"
      body="Shown on your driver card to nearby drivers."
      onPrimary={() => { setCar(`${year} ${make} ${model}`); go('visibility'); }}
      primaryLabel="Continue">
      {/* car photo placeholder w/ silhouette tinted to selected color */}
      <div style={{
        marginBottom: 20, padding: 14, borderRadius: 16,
        background: 'linear-gradient(180deg, #131316 0%, #0a0a0c 100%)',
        border: '1px solid var(--line)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 110,

        <CarGlyph color={selected.hex} size={170} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr', gap: 10, marginBottom: 14 }}>
        <Field label="Year">
          <input value={year} type="number" onChange={e => setYear(e.target.value)} style={fieldInput}/>
        </Field>
        <Field label="Make">
          <input value={make} onChange={e => setMake(e.target.value)} style={fieldInput}/>
        </Field>
      </div>
      <Field label="Model">
        <input value={model} onChange={e => setModel(e.target.value)} style={fieldInput}/>
      </Field>

      <div style={{ marginTop: 16 }}>
        <FieldLabel>Color</FieldLabel>
        <div style={{ display: 'flex', gap: 8, marginTop: 6, flexWrap: 'wrap' }}>
          {colors.map(c => (
            <button key={c.id} onClick={() => setColor(c.id)} style={{
              width: 34, height: 34, borderRadius: '50%', cursor: 'pointer',

      </div>

}

function VisRow({ label, sub, tint, children }) {
  const c =
    tint === 'accent' ? 'rgba(255,106,26,0.5)' :
    tint === 'ok' ? 'rgba(91,228,155,0.5)' :
    'rgba(255,255,255,0.12)';
  const bg =
    tint === 'accent' ? 'rgba(255,106,26,0.08)' :
    tint === 'ok' ? 'rgba(91,228,155,0.06)' :
    'var(--surface-1)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 14,
      padding: 14, borderRadius: 14,

        <div style={{ marginTop: 2, fontSize: 12, color: 'var(--text-dim)' }}>{sub}</div>

}
function ChainArrow() {
  return (
    <div style={{ textAlign: 'center', color: 'var(--text-mute)' }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </div>
  );
}

// ─── 6. Private zones ─────────────────────────────────────
function PrivateZonesScreen({ go, back }) {
  const [zones, setZones] = React.useState([
    { id: 'home',   label: 'Home',         set: false, hint: 'Default block: 250m' },
    { id: 'work',   label: 'Work / School',set: false, hint: 'Default block: 150m' },
  ]);
  const add = (id) => setZones(z => z.map(x => x.id === id ? { ...x, set: true } : x));

  return (
    <OnboardingShell
      step={4} total={4} onBack={back}
      eyebrow="STEP 4 OF 4"
      title="Private Zones"
      body="RoadPing won't go live near places you don't want to reveal. Private Zones are never shown to other users."
      onPrimary={() => go('safety')}
      primaryLabel="Done"
      secondaryLabel="Skip for now"
      onSecondary={() => go('safety')}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {zones.map(z => (
          <div key={z.id} style={{
            display: 'flex', alignItems: 'center', gap: 12,
            padding: 14, borderRadius: 14,
            background: 'var(--surface-1)', border: '1px solid var(--line)',
          }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10,
              background: z.set ? 'rgba(91,228,155,0.12)' : 'rgba(255,255,255,0.04)',
              border: `1px solid ${z.set ? 'rgba(91,228,155,0.5)' : 'var(--line)'}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              {z.id === 'home' ? (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={z.set ? '#5BE49B' : '#fff'} strokeWidth="1.7"><path d="M3 10l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              ) : (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={z.set ? '#5BE49B' : '#fff'} strokeWidth="1.7"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              )}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{z.label}</div>
              <div style={{ marginTop: 2, fontSize: 12, color: 'var(--text-dim)' }}>
                {z.set ? 'Saved · block 250m radius' : z.hint}
              </div>
            </div>
            {z.set ? (
              <span style={{
                fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em',
                color: '#5BE49B', padding: '4px 10px', borderRadius: 999,
                background: 'rgba(91,228,155,0.10)', border: '1px solid rgba(91,228,155,0.4)',
              }}>SET</span>
            ) : (
              <button onClick={() => add(z.id)} style={{
                fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.16em',
                color: '#FF6A1A', padding: '6px 12px', borderRadius: 999, cursor: 'pointer',
                background: 'rgba(255,106,26,0.10)', border: '1px solid rgba(255,106,26,0.45)',
              }}>+ ADD</button>
            )}
          </div>
        ))}
        <button onClick={() => go('customZone')} style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          padding: 14, borderRadius: 14, cursor: 'pointer',
          background: 'rgba(255,255,255,0.03)', border: '1px dashed var(--line-2)',
          color: 'var(--text-dim)', fontFamily: 'var(--mono)', fontSize: 10.5, letterSpacing: '0.18em',
        }}>
          + ADD CUSTOM ZONE
        </button>
      </div>

      <div style={{
        marginTop: 18, padding: 14, borderRadius: 12,
        background: 'rgba(255,255,255,0.03)', border: '1px solid var(--line)',
        fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.5,
      }}>
        <span style={{ color: '#fff', fontWeight: 600 }}>Heads-up.</span> If you press Start while inside a Private Zone, RoadPing will refuse to go live until you move farther away.
      </div>
    </OnboardingShell>
  );

// Convert "MISSION ST" → "Mission St"
function toTitle(s) {
  return s.toLowerCase()
    .split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ')
    .replace(/(\d)(St|Nd|Rd|Th)/i, (_, n, suf) => n + suf.toLowerCase());
}

// ── Driver dot on the road ──────────────────────────────────
function MapDot({ d, x, y, isFocus, isSelected, onTap }) {
  const isTalking = d.talking;
  const r = d.active ? 7 : 5.5;
  const labelDim = !d.active;
  const showLabel = d.active; // hide labels for far/inactive ones to avoid clutter

  return (
    <g transform={`translate(${x}, ${y})`} style={{ cursor: 'pointer' }} onClick={onTap}>
      {/* tap target */}
      <circle r="22" fill="rgba(0,0,0,0)"/>
      {/* talking pings */}
      {isTalking && (
        <>
          <circle r="10" fill="none" stroke="rgba(255,106,26,0.85)" strokeWidth="1.5">
            <animate attributeName="r" from="7" to="26" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.95" to="0" dur="1.2s" repeatCount="indefinite"/>
          </circle>
          <circle r="14" fill="none" stroke="rgba(255,106,26,0.5)" strokeWidth="1">
            <animate attributeName="r" from="10" to="32" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.7" to="0" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
          </circle>
        </>
      )}
      {/* dark backing */}
      <circle r={r + 2.5} fill="#0a0b0e"/>
      {/* main */}
      <circle r={r}
        fill={d.active ? d.color : 'rgba(255,255,255,0.22)'}
        stroke={isTalking ? '#FF6A1A' : (isSelected ? '#fff' : 'rgba(255,255,255,0.4)')}
        strokeWidth={isTalking || isSelected ? 1.6 : 0.8}/>
      {/* always-visible distance + handle for active drivers */}
      {showLabel && (
        <g transform="translate(0, 17)">
          <text textAnchor="middle"
            fill={isTalking ? '#FF6A1A' : 'rgba(255,255,255,0.9)'}
            fontFamily="JetBrains Mono, monospace" fontSize="7.5"
            fontWeight={isTalking ? '600' : '500'}
            letterSpacing="0.04em"
            style={{ paintOrder: 'stroke', stroke: 'rgba(0,0,0,0.9)', strokeWidth: 2 }}>
            @{d.handle}
          </text>
          <text y="9" textAnchor="middle"
            fill={isTalking ? 'rgba(255,180,120,0.9)' : 'rgba(255,255,255,0.55)'}
            fontFamily="JetBrains Mono, monospace" fontSize="6.5"
            letterSpacing="0.08em"
            style={{ paintOrder: 'stroke', stroke: 'rgba(0,0,0,0.85)', strokeWidth: 2 }}>
            {d.dist}m
          </text>
        </g>
      )}
    </g>
  );
}

// ── Selected driver inline card (above the dot) ─────────────
function DriverPreviewCard({ d, mapX, mapY, W, H, onOpen }) {
  // Position the card so it doesn't fall off the map.
  // Card is a fixed pixel-ish size positioned by percent on the container.
  // We anchor at the dot and offset.
  const cardW = 200, cardH = 92;
  // try above by default; if too close to top, go below
  const above = mapY > 200;
  // Container has fixed aspect so we use percentage positioning
  const left = (mapX / W) * 100;
  const top  = (mapY / H) * 100;

  return (
    <div style={{
      position: 'absolute',
      left: `${left}%`,
      top: `${top}%`,
      transform: `translate(-50%, ${above ? 'calc(-100% - 22px)' : '22px'})`,
      width: cardW,
      pointerEvents: 'auto',
      zIndex: 4,
      animation: 'rpFadeIn 0.18s ease',
    }}>
      <div style={{
        position: 'relative',
        padding: 12,
        borderRadius: 14,
        background: 'rgba(14,14,16,0.92)',
        backdropFilter: 'blur(20px) saturate(180%)',
        WebkitBackdropFilter: 'blur(20px) saturate(180%)',
        border: '1px solid rgba(255,255,255,0.14)',
        boxShadow: '0 12px 28px rgba(0,0,0,0.55)',

        {/* pointer arrow */}
        <span style={{

          background: 'rgba(14,14,16,0.92)',
          borderRight: above ? '1px solid rgba(255,255,255,0.14)' : 'none',
          borderBottom: above ? '1px solid rgba(255,255,255,0.14)' : 'none',
          borderLeft: !above ? '1px solid rgba(255,255,255,0.14)' : 'none',

            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {d.car || `${d.year} ${d.make} ${d.model}`}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 13, color: '#FF6A1A' }}>{d.dist}m</div>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 8, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.14em' }}>
              {d.talking ? 'ON AIR' : 'LISTENING'}

        <button onClick={onOpen} style={{

          border: '1px solid rgba(255,106,26,0.5)',

          letterSpacing: '0.16em', cursor: 'pointer',
        }}>
          OPEN DRIVER CARD
        </button>
      </div>

  );
}

// ─── Radar visual ─────────────────────────────────────────────
function RadarView({ drivers, onTapDriver, talking, incomingFrom, focusId }) {
  const size = 340;
  const center = size / 2;
  const maxRange = 500;
  const ringRadii = [60, 120, 168]; // visual radii for 150m, 300m, 500m
  const labels = ['150', '300', '500'];

  // sweep rotation
  const [sweep, setSweep] = React.useState(0);
  React.useEffect(() => {
    let raf;
    let last = performance.now();
    const tick = (t) => {
      const dt = (t - last) / 1000; last = t;
      setSweep(s => (s + dt * 55) % 360); // 360deg per ~6.5s
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const posOf = (dist, angleDeg) => {
    const r = (Math.min(dist, maxRange) / maxRange) * 168;
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: center + Math.cos(a) * r, y: center + Math.sin(a) * r };
  };

  return (
    <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
      {/* concentric rings */}
      <svg width={size} height={size} style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <radialGradient id="radarFill" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="rgba(255,106,26,0.10)" />
            <stop offset="60%" stopColor="rgba(255,106,26,0.03)" />
            <stop offset="100%" stopColor="rgba(255,106,26,0)" />
          </radialGradient>
          <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="rgba(255,106,26,0)" />
            <stop offset="100%" stopColor="rgba(255,106,26,0.55)" />
          </linearGradient>
        </defs>
        <circle cx={center} cy={center} r="168" fill="url(#radarFill)" />
        {ringRadii.map((r, i) => (
          <circle key={i} cx={center} cy={center} r={r} fill="none"
            stroke={i === 2 ? 'rgba(255,106,26,0.35)' : 'rgba(255,255,255,0.08)'}
            strokeWidth={i === 2 ? 1 : 1}
            strokeDasharray={i === 2 ? '0' : '2 4'} />
        ))}
        {/* crosshairs */}
        <line x1={center} y1={center - 168} x2={center} y2={center + 168} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 6" />
        <line x1={center - 168} y1={center} x2={center + 168} y2={center} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 6" />
        {/* sweep arc */}
        <g transform={`rotate(${sweep} ${center} ${center})`}>
          <path d={`M ${center} ${center} L ${center + 168} ${center} A 168 168 0 0 0 ${center + 168 * Math.cos(-0.7)} ${center + 168 * Math.sin(-0.7)} Z`}
            fill="url(#sweepGrad)" opacity="0.65" />
        </g>
        {/* labels */}
        {ringRadii.map((r, i) => (
          <text key={i} x={center + 4} y={center - r - 4}
            fill="rgba(255,255,255,0.35)"
            fontFamily="JetBrains Mono, monospace" fontSize="9"
            letterSpacing="0.08em">
            {labels[i]}m
          </text>
        ))}
      </svg>

      {/* driver dots */}
      {drivers.map(d => {
        const p = posOf(d.dist, d.angle);
        return (
          <DriverDot key={d.id} d={d} x={p.x} y={p.y}
            isFocus={focusId === d.id}
            onTap={() => onTapDriver(d)} />
        );
      })}

      {/* center "you" pulse */}
      <CenterPulse talking={talking} incoming={!!incomingFrom} />
    </div>
  );
}

// ─── Hold-to-talk button ──────────────────────────────────────
function HoldToTalk({ state, onPressStart, onPressEnd }) {
  // state: 'idle' | 'recording' | 'sending' | 'incoming'
  const isRec = state === 'recording';
  const isSend = state === 'sending';
  const isIn = state === 'incoming';
  const label =
    isRec ? 'ON AIR' :
    isSend ? 'MIC CLOSED' :
    isIn ? 'LIVE VOICE' :
    'HOLD TO TALK';
  const ringColor = isRec ? '#FF3D2E' : isIn ? '#5BE49B' : '#FF6A1A';

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
    }}>
      {/* waveform / status row */}
      <div style={{
        height: 26, display: 'flex', alignItems: 'center', gap: 8,
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5,

        )}
        {isIn && <Waveform color="#5BE49B" />}
        <span>{label}</span>
      </div>

      <button
        onPointerDown={(e) => { e.preventDefault(); onPressStart && onPressStart(); }}
        onPointerUp={() => onPressEnd && onPressEnd()}
        onPointerCancel={() => onPressEnd && onPressEnd()}
        onPointerLeave={() => isRec && onPressEnd && onPressEnd()}
        style={{
          position: 'relative',
          width: 132, height: 132, borderRadius: '50%',
          border: 'none', cursor: 'pointer',
          background: isRec
            ? 'radial-gradient(circle at 50% 35%, #FF8A3D 0%, #FF3D2E 65%, #B71F15 100%)'
