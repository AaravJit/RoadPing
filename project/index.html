<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RoadPing — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000;
      --surface-1: #0a0a0a;
      --surface-2: #131313;
      --surface-3: #1c1c1c;
      --line: rgba(255,255,255,0.08);
      --line-2: rgba(255,255,255,0.14);
      --text: #f5f5f5;
      --text-dim: rgba(245,245,245,0.62);
      --text-mute: rgba(245,245,245,0.38);
      --accent: #FF6A1A;
      --accent-soft: rgba(255,106,26,0.16);
      --accent-glow: rgba(255,106,26,0.55);
      --danger: #FF3D2E;
      --safe: #5BE49B;
      --sans: 'Space Grotesk', -apple-system, system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(1200px 800px at 50% 20%, #0d0a08 0%, #000 60%);
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 16px 60px;
    }
    .brandbar {
      width: 100%; max-width: 1100px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 4px 12px;
    }
    .wordmark {
      font-family: var(--sans);
      font-weight: 700; font-size: 17px; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px;
    }
    .wordmark .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .wordmark .small { color: var(--text-mute); font-weight: 500; margin-left: 6px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
    .picker {
      display: flex; gap: 4px; flex-wrap: nowrap;
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      max-width: 760px;
    }
    .picker::-webkit-scrollbar { display: none; }
    .picker button {
      font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); background: transparent; border: none;
      padding: 7px 10px; border-radius: 999px; cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .picker button:hover { color: var(--text); }
    .picker button.active {
      background: var(--accent); color: #0a0a0a;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .stage {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .stage::before {
      content: ''; position: absolute; inset: -20px;
      background: radial-gradient(400px 400px at 50% 50%, rgba(255,106,26,0.08), transparent 70%);
      pointer-events: none;
    }
    .hint {
      margin-top: 22px;
      font-family: var(--mono); font-size: 11px; color: var(--text-mute);
      letter-spacing: 0.08em; text-transform: uppercase;
      text-align: center;
    }
    .hint kbd {
      font-family: var(--mono); font-size: 10px;
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 2px 6px; border-radius: 4px; color: var(--text-dim);
    }
    /* Phone-internal helpers */
    .rp-app { position: absolute; inset: 0; overflow: hidden; background: #000; color: var(--text); font-family: var(--sans); }
    .rp-screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
    button { font-family: inherit; }
    /* No scroll on phone inner content unless explicit */
    .rp-app *::-webkit-scrollbar { display: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="brandbar">
    <div class="wordmark">
      <span class="dot"></span>
      RoadPing
      <span class="small">v0.1 · interactive prototype</span>
    </div>
    <div id="picker-root"></div>
  </div>

  <div class="stage" id="stage-root"></div>

  <div class="hint">Hold the orange button to talk · Tap a driver dot to see their card · <kbd>1–8</kbd> jumps screens</div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="vehicles.jsx"></script>
  <script type="text/babel" src="zones.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="radar.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
